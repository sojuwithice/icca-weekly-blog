<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>ICCA CMS | Upload Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #245290;
            --secondary: #91bad3;
            --bg: #f4f7f6;
            --accent: #F8ECE0;
            --white: #ffffff;
            --danger: #e74c3c;
            --gray: #7a8ba0;
            --dark: #1e3a5a;
        }

        body {
            background: var(--bg);
            padding: 50px 20px;
            font-family: 'Inter', sans-serif;
            color: var(--dark);
        }

        .dashboard-header { text-align: center; margin-bottom: 50px; }
        .dashboard-header h1 {
            font-family: 'Archivo Black', sans-serif;
            font-size: 35px;
            color: var(--primary);
            text-transform: uppercase;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: 480px 1fr;
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: var(--white);
            border-radius: 28px;
            padding: 30px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(145, 186, 211, 0.2);
        }

        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 6px; color: var(--gray); text-transform: uppercase; }
        input, textarea, select {
            width: 100%; padding: 12px; border: 2px solid #eef2f6; border-radius: 12px; font-size: 14px; outline: none;
        }

        /* Pair Styling */
        .td-pair-group {
            background: #f9fbfd;
            border: 1px solid #eef2f8;
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
        }

        .plus-box {
            background: var(--primary); color: white; width: 30px; height: 30px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 8px; cursor: pointer; font-weight: bold;
        }

        .btn-save {
            background: var(--primary); color: white; border: none; padding: 16px;
            border-radius: 15px; width: 100%; font-weight: 700; cursor: pointer;
            margin-top: 10px;
        }

        /* Preview area for image */
       .img-preview-box {
    width: 100%;
    background: #eee;
    border-radius: 10px;
    margin-top: 8px;
    padding: 8px;
    overflow: visible;
}

        .preview-gallery {
    display: grid !important;
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 8px;
    margin-top: 10px;
    width: 100%;
}

.preview-gallery img {
    display: block;
}

        .preview-item {
            position: relative;
            display: inline-block;
        }

        .preview-gallery .preview-item img {
            width: 100%;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #eef2f8;
        }

        .remove-img-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }

        .remove-img-btn:hover {
            transform: scale(1.1);
            background: #c0392b;
        }

        /* Entry List styling */
        .entry-item {
            background: white; border: 1px solid #eef2f8; padding: 15px;
            border-radius: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
        }
        .preview-mini-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 6px;
            border-radius: 8px;
            transition: 0.2s;
        }

        .action-btn:hover {
            background: #f1f5f9;
        }

        .edit-btn {
            color: var(--primary);
        }

        .delete-btn {
            color: var(--danger);
        }

        .days-badge {
            background: #eef2fa;
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            color: var(--primary);
            margin-top: 4px;
        }
        
        .edit-mode-banner {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 10px 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #b45309;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .cancel-edit-btn {
            background: #e2e8f0;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            color: #1e293b;
        }
        
        .cancel-edit-btn:hover {
            background: #cbd5e1;
        }
    </style>
</head>

    <script>
        // ======================== PERSISTENT EDIT MODE ========================
        // We store edit session in localStorage so it survives refresh
        let isEditingMode = false;
        let editingMonth = null;
        let editingId = null;
        let editingOriginalData = null; // store original entry data for reference
        
        // Save current edit session to localStorage
        function saveEditSession() {
            if (isEditingMode && editingMonth && editingId) {
                // Capture current form data
                const formState = {
                    weekNum: document.getElementById('weekNum').value,
                    weekDate: document.getElementById('weekDate').value,
                    workHours: document.getElementById('workHours').value,
                    monthSelect: document.getElementById('monthSelect').value,
                    pairs: []
                };
                
                document.querySelectorAll('.td-pair-group').forEach(group => {
                    const title = group.querySelector('.pair-title')?.value || '';
                    const description = group.querySelector('.pair-desc')?.value || '';
                    const days = group.querySelector('.pair-days')?.value || '';
                    const hours = group.querySelector('.pair-hours')?.value || '';
                    let images = [];
                    const hiddenBase = group.querySelector('.pair-base64');
                    if (hiddenBase) {
                        try { images = JSON.parse(hiddenBase.value); } catch(e) { images = []; }
                    }
                    formState.pairs.push({ title, description, days, hours, images });
                });
                
                const sessionData = {
                    isEditing: true,
                    editingMonth: editingMonth,
                    editingId: editingId,
                    formState: formState,
                    originalData: editingOriginalData
                };
                localStorage.setItem('icca_edit_session', JSON.stringify(sessionData));
            } else {
                localStorage.removeItem('icca_edit_session');
            }
        }
        
        // Restore edit session after page refresh
        function restoreEditSession() {
            const saved = localStorage.getItem('icca_edit_session');
            if (!saved) return false;
            
            try {
                const session = JSON.parse(saved);
                if (session.isEditing && session.editingMonth && session.editingId && session.formState) {
                    isEditingMode = true;
                    editingMonth = session.editingMonth;
                    editingId = session.editingId;
                    editingOriginalData = session.originalData;
                    
                    // Restore form fields
                    document.getElementById('weekNum').value = session.formState.weekNum || '';
                    document.getElementById('weekDate').value = session.formState.weekDate || '';
                    document.getElementById('workHours').value = session.formState.workHours || '';
                    document.getElementById('monthSelect').value = session.formState.monthSelect || 'february';
                    
                    // Rebuild pairs
                    const container = document.getElementById('pairsContainer');
                    container.innerHTML = '';
                    pairCounter = 0;
                    
                    if (session.formState.pairs && session.formState.pairs.length) {
                        session.formState.pairs.forEach(pairData => {
                            addNewPairWithData(pairData);
                        });
                    } else {
                        addNewPair();
                    }
                    
                    updateEditBanner();
                    return true;
                }
            } catch(e) { console.error("Restore error", e); }
            return false;
        }
        
        function clearEditSession() {
            localStorage.removeItem('icca_edit_session');
            isEditingMode = false;
            editingMonth = null;
            editingId = null;
            editingOriginalData = null;
            updateEditBanner();
        }
        
        function updateEditBanner() {
            const bannerDiv = document.getElementById('editBanner');
            if (isEditingMode && editingMonth && editingId) {
                bannerDiv.innerHTML = `
                    <div class="edit-mode-banner">
                        <span>✏️ EDITING MODE: You are editing entry from ${editingMonth.toUpperCase()} (ID: ${editingId})</span>
                        <button class="cancel-edit-btn" onclick="cancelEdit()">Cancel Edit</button>
                    </div>
                `;
            } else {
                bannerDiv.innerHTML = '';
            }
        }
        
        function cancelEdit() {
            if (confirm("Cancel editing? Any unsaved changes will be lost.")) {
                // Restore the original entry back to storage if it was removed
                if (editingOriginalData && editingMonth && editingId) {
                    let data = JSON.parse(localStorage.getItem('ojtBlogData')) || { february: [], march: [], april: [], may: [] };
                    // Check if entry already exists (maybe not, because we removed it)
                    const exists = data[editingMonth]?.some(e => e.id === editingId);
                    if (!exists && editingOriginalData) {
                        data[editingMonth].push(editingOriginalData);
                        localStorage.setItem('ojtBlogData', JSON.stringify(data));
                    }
                }
                clearEditSession();
                resetFormToEmpty();
                displayEntries();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }
        
        // Render preview with remove buttons
        function renderPreviewWithRemove(container, imagesArray, hiddenInput) {
            if (!container) return;
            container.innerHTML = '';
            imagesArray.forEach((imgSrc, idx) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'preview-item';
                wrapper.style.position = 'relative';
                const img = document.createElement('img');
                img.src = imgSrc;
                const removeBtn = document.createElement('button');
                removeBtn.innerHTML = '✕';
                removeBtn.className = 'remove-img-btn';
                removeBtn.onclick = (e) => {
                    e.stopPropagation();

                    imagesArray.splice(idx, 1);

                    hiddenInput.value = JSON.stringify(imagesArray);

                    renderPreviewWithRemove(container, imagesArray, hiddenInput);

                    saveEditSession();
                };
                wrapper.appendChild(img);
                wrapper.appendChild(removeBtn);
                container.appendChild(wrapper);
            });
        }
        
        function addNewPair() {
            const id = pairCounter++;
            const div = document.createElement('div');
            div.className = 'td-pair-group';
            div.setAttribute('data-pair-id', id);
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <b style="font-size:12px; color:var(--primary)">Entry ${id + 1}</b>
                    <span style="color:var(--danger); cursor:pointer; font-weight:bold" onclick="this.parentElement.parentElement.remove(); saveEditSession()">✕</span>
                </div>
                <input type="text" class="pair-title" placeholder="Title (e.g. Onsite Accomplishment)" style="margin-bottom:10px;">
                <textarea class="pair-desc" placeholder="What did you do?" style="margin-bottom:10px; height: 80px;"></textarea>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
                    <div>
                        <label style="font-size:10px; color:var(--gray); font-weight:600; display:block; margin-bottom:4px;">DAYS PRESENT</label>
                        <input type="text" class="pair-days" placeholder="e.g. 02" 
                            style="width:100%; padding:10px 12px; border:2px solid #eef2f6; border-radius:10px; font-size:13px; outline:none;">
                    </div>
                    <div>
                        <label style="font-size:10px; color:var(--gray); font-weight:600; display:block; margin-bottom:4px;">WORK HOURS</label>
                        <input type="text" class="pair-hours" placeholder="e.g. 08" 
                            style="width:100%; padding:10px 12px; border:2px solid #eef2f6; border-radius:10px; font-size:13px; outline:none;">
                    </div>
                </div>
                <label style="font-size:10px;">Upload Photo:</label>
                <input type="file" class="pair-file-input" accept="image/*" multiple onchange="handleFileSelect(this)">
                <div class="img-preview-box preview-gallery"></div>
            `;
            document.getElementById('pairsContainer').appendChild(div);
            
            // Add input listeners to auto-save edit session
            const inputs = div.querySelectorAll('input, textarea');
            inputs.forEach(inp => inp.addEventListener('input', () => saveEditSession()));
            return div;
        }
        
        function addNewPairWithData(prefillData) {
            const div = addNewPair(); // creates empty pair
            const titleInput = div.querySelector('.pair-title');
            const descInput = div.querySelector('.pair-desc');
            const daysInput = div.querySelector('.pair-days');
            const hoursInput = div.querySelector('.pair-hours');
            const hiddenBase = div.querySelector('.pair-base64');
            const previewContainer = div.querySelector('.preview-gallery');
            
            if (titleInput) titleInput.value = prefillData.title || '';
            if (descInput) descInput.value = prefillData.description || '';
            if (daysInput) daysInput.value = prefillData.days || '';
            if (hoursInput) hoursInput.value = prefillData.hours || '';
            
            const imagesArr = prefillData.images || [];
            if (hiddenBase) hiddenBase.value = JSON.stringify(imagesArr);
            if (previewContainer && imagesArr.length) {
                renderPreviewWithRemove(previewContainer, imagesArr, hiddenBase);
            }
            return div;
        }
        
        function handleFileSelect(input) {
    const files = Array.from(input.files);

    const previewBox = input.parentElement.querySelector('.preview-gallery');
    const hiddenInput = input.parentElement.querySelector('.pair-base64');

    if (!previewBox || !hiddenInput) return;

    let storedImages = JSON.parse(hiddenInput.value || "[]");

    if (storedImages.length + files.length > 5) {
        alert("⚠️ Max 5 images per accomplishment");
        input.value = '';
        return;
    }

    let pending = files.length;

    files.forEach(file => {
        if (!file.type.startsWith("image/")) {
            pending--;
            return;
        }

        compressImage(file, 900, 0.7, base64 => {
            storedImages.push(base64);

            hiddenInput.value = JSON.stringify(storedImages);

            renderPreviewWithRemove(previewBox, storedImages, hiddenInput);

            saveEditSession();

            pending--;
            if (pending === 0) input.value = '';
        });
    });
}
        
        function compressImage(file, maxSize, quality, callback) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement("canvas");
                    let scale = Math.min(maxSize / img.width, maxSize / img.height, 1);
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    const ctx = canvas.getContext("2d");
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    callback(canvas.toDataURL("image/jpeg", quality));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        function saveContent() {
            const month = document.getElementById('monthSelect').value;
            const week = document.getElementById('weekNum').value.trim();
            const date = document.getElementById('weekDate').value.trim();
            const totalHours = document.getElementById('workHours').value.trim();
            
            if (!week) {
                alert("Lagyan mo ng Week");
                return;
            }
            
            const pairs = [];
            let hasValid = false;
            const allGroups = document.querySelectorAll('.td-pair-group');
            
            for (let group of allGroups) {
                const title = group.querySelector('.pair-title').value.trim();
                const description = group.querySelector('.pair-desc').value.trim();
                const days = group.querySelector('.pair-days').value.trim();
                const hours = group.querySelector('.pair-hours').value.trim();
                const imagesRaw = group.querySelector('.pair-base64').value;
                let images = [];
                try { images = JSON.parse(imagesRaw || "[]"); } catch(e) { images = []; }
                
                if (title) {
                    hasValid = true;
                    pairs.push({ title, description, days, hours, images });
                }
            }
            
            if (!hasValid) {
                alert("Lagyan mo kahit isang accomplishment na may title");
                return;
            }
            
            const newEntry = { id: Date.now(), week, date, totalHours, pairs };
            let data = JSON.parse(localStorage.getItem('ojtBlogData')) || { february: [], march: [], april: [], may: [] };
            
            if (isEditingMode && editingMonth && editingId) {
                // Remove old entry if exists
                if (data[editingMonth]) {
                    data[editingMonth] = data[editingMonth].filter(entry => entry.id !== editingId);
                }
                data[month].push(newEntry);
                clearEditSession();
                alert("Entry updated successfully!");
            } else {
                data[month].push(newEntry);
                alert("Published Successfully!");
            }
            
            try {
    localStorage.setItem('ojtBlogData', JSON.stringify(data));

    // ===================== NEW: SAVE TO SUPABASE =====================
    (async () => {
        try {
            const month = document.getElementById('monthSelect').value;

            const { data: entryRow, error: entryErr } =
                await supabaseClient.from('ojt_entries')
                .insert({
                    month: month,
                    week: newEntry.week,
                    date: newEntry.date,
                    total_hours: newEntry.totalHours
                })
                .select()
                .single();

            if (entryErr) throw entryErr;

            for (const pair of newEntry.pairs) {
                const { data: accRow, error: accErr } =
                    await supabaseClient.from('ojt_accomplishments')
                    .insert({
                        entry_id: entryRow.id,
                        title: pair.title,
                        description: pair.description,
                        days: pair.days,
                        hours: pair.hours
                    })
                    .select()
                    .single();

                if (accErr) throw accErr;

                for (const img64 of pair.images || []) {
                    const file = base64ToFile(img64, `${Date.now()}.jpg`);
                    const path = `${month}/${newEntry.week}/${Date.now()}.jpg`;

                    const { data: uploadData, error: uploadErr } =
                        await supabaseClient.storage
                            .from('ojt-images')
                            .upload(path, file);

                    if (uploadErr) throw uploadErr;

                    const { data: urlData } =
                        supabaseClient.storage
                            .from('ojt-images')
                            .getPublicUrl(uploadData.path);

                    await supabaseClient.from('ojt_images').insert({
                        accomplishment_id: accRow.id,
                        image_url: urlData.publicUrl
                    });
                }
            }

        } catch (dbErr) {
            console.error("Supabase save failed:", dbErr);
            alert("⚠️ Saved locally but failed to sync to Supabase");
        }
    })();

    resetFormToEmpty();
    displayEntries();

} catch (e) {
    alert("Storage limit reached. Bawasan images.");
}
        }
        
        function resetFormToEmpty() {
            document.getElementById('weekNum').value = '';
            document.getElementById('weekDate').value = '';
            document.getElementById('workHours').value = '';
            document.getElementById('monthSelect').value = 'february';
            document.getElementById('pairsContainer').innerHTML = '';
            pairCounter = 0;
            addNewPair();
            isEditingMode = false;
            editingMonth = null;
            editingId = null;
            editingOriginalData = null;
            clearEditSession();
            updateEditBanner();
        }
        
        function displayEntries() {
            const data = JSON.parse(localStorage.getItem('ojtBlogData')) || {};
            let html = '';
            for (let m in data) {
                if (data[m].length === 0) continue;
                data[m].forEach(item => {
                    let imgs = '';
                    let daysPresentList = '';
                    let imgCount = 0;
                    item.pairs.forEach(pair => {
                        if (pair.days && pair.days.trim()) {
                            daysPresentList += `<span class="days-badge">📆 ${pair.days}d</span> `;
                        }
                        if (pair.images && pair.images.length && imgCount < 3) {
                            pair.images.forEach(img => {
                                if (imgCount < 3) {
                                    imgs += `<img src="${img}" class="preview-mini-img">`;
                                    imgCount++;
                                }
                            });
                        }
                    });
                    html += `
                        <div class="entry-item">
                            <div style="display:flex; gap:15px; align-items:center; flex-wrap:wrap;">
                                <div style="display:flex; gap:5px; flex-wrap:wrap;">
                                    ${imgs || '<div style="width:50px;height:50px;background:#eef2f6;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;color:gray;">📷</div>'}
                                </div>
                                <div>
                                    <b style="color:var(--primary); font-size:14px;">${m.toUpperCase()} | ${item.week}</b>
                                    ${item.date ? `<div style="font-size:11px; color:var(--gray);">${item.date}</div>` : ''}
                                    <div style="margin-top: 5px;">${daysPresentList || '<span class="days-badge">✨ days present</span>'}</div>
                                    <small style="color:var(--gray)">${item.pairs.length} accomplishments</small>
                                </div>
                            </div>
                            <div style="display:flex; gap:8px; align-items:center;">
                                <button class="action-btn edit-btn" onclick="editEntry('${m}', ${item.id})" title="Edit">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                                        <path d="M12 20h9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                        <path d="M16.5 3.5l4 4L7 21H3v-4L16.5 3.5z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                                    </svg>
                                </button>
                                <button class="action-btn delete-btn" onclick="deleteEntry('${m}', ${item.id})" title="Delete">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                                        <path d="M3 6h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                        <path d="M8 6V4h8v2" stroke="currentColor" stroke-width="2"/>
                                        <path d="M6 6l1 16h10l1-16" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    `;
                });
            }
            document.getElementById('contentList').innerHTML = html || '<p style="text-align:center;color:var(--gray);">Empty list.</p>';
        }
        
        window.deleteEntry = (m, id) => {
            if(confirm("Delete this entry?")) {
                let data = JSON.parse(localStorage.getItem('ojtBlogData'));
                if(data[m]) {
                    data[m] = data[m].filter(i => i.id !== id);
                    localStorage.setItem('ojtBlogData', JSON.stringify(data));
                    displayEntries();
                    if (isEditingMode && editingId === id && editingMonth === m) {
                        cancelEdit();
                    }
                }
            }
        };
        
        window.editEntry = (month, id) => {
            const data = JSON.parse(localStorage.getItem('ojtBlogData'));
            if (!data[month]) return;
            const entry = data[month].find(i => i.id === id);
            if (!entry) return;
            
            // Store original data for potential cancel
            editingOriginalData = JSON.parse(JSON.stringify(entry));
            
            // Fill main form
            document.getElementById('weekNum').value = entry.week || '';
            document.getElementById('weekDate').value = entry.date || '';
            document.getElementById('workHours').value = entry.totalHours || '';
            document.getElementById('monthSelect').value = month;
            
            // Clear and rebuild pairs
            const container = document.getElementById('pairsContainer');
            container.innerHTML = '';
            pairCounter = 0;
            
            if (entry.pairs && entry.pairs.length) {
                entry.pairs.forEach(pairItem => {
                    addNewPairWithData(pairItem);
                });
            } else {
                addNewPair();
            }
            
            isEditingMode = true;
            editingMonth = month;
            editingId = id;
            
            // Remove the old entry from storage temporarily (will be replaced on save)
            data[month] = data[month].filter(i => i.id !== id);
            localStorage.setItem('ojtBlogData', JSON.stringify(data));
            
            // Save edit session so refresh works
            saveEditSession();
            updateEditBanner();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        
        // Set up auto-save for all form inputs
        function attachAutoSave() {
            const inputs = ['weekNum', 'weekDate', 'workHours', 'monthSelect'];
            inputs.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('input', () => saveEditSession());
                    el.addEventListener('change', () => saveEditSession());
                }
            });
            
            // Monitor pairs container for changes
            const observer = new MutationObserver(() => saveEditSession());
            const container = document.getElementById('pairsContainer');
            if (container) {
                observer.observe(container, { childList: true, subtree: true, attributes: true, attributeFilter: ['value'] });
            }
        }
        
        let pairCounter = 0;
        
        window.onload = () => {
            const restored = restoreEditSession();
            if (!restored) {
                document.getElementById('pairsContainer').innerHTML = '';
                pairCounter = 0;
                addNewPair();
            }
            displayEntries();
            attachAutoSave();
            updateEditBanner();
        };

function base64ToFile(base64, filename) {
  const arr = base64.split(',');
  const mime = arr[0].match(/:(.*?);/)[1];
  const bstr = atob(arr[1]);
  let n = bstr.length;
  const u8arr = new Uint8Array(n);
  while (n--) u8arr[n] = bstr.charCodeAt(n);
  return new File([u8arr], filename, { type: mime });
}

async function migrateToSupabase() {
  if (!confirm("⚠️ This will upload ALL local data to Supabase.\nExisting Supabase data may duplicate.\nProceed?")) {
    return;
  }

  const data = JSON.parse(localStorage.getItem('ojtBlogData'));
  if (!data) {
    alert("No local data found.");
    return;
  }

  let totalEntries = 0;
  let totalAccomplishments = 0;
  let totalImages = 0;

  for (const month in data) {
    for (const entry of data[month]) {
      totalEntries++;
      
      // 1️⃣ INSERT ENTRY
      const { data: entryRow, error: entryErr } =
        await supabaseClient.from('ojt_entries')
        .insert({
          month: month,
          week: entry.week,
          date: entry.date || null,
          total_hours: entry.totalHours || null,
          created_at: new Date().toISOString()
        })
        .select()
        .single();

      if (entryErr) {
        console.error("Entry error:", entryErr);
        throw new Error(`Entry insert failed: ${entryErr.message}`);
      }

      // 2️⃣ ACCOMPLISHMENTS
      for (const pair of entry.pairs) {
        totalAccomplishments++;
        
        const { data: accRow, error: accErr } =
          await supabaseClient.from('ojt_accomplishments')
          .insert({
            entry_id: entryRow.id,
            title: pair.title,
            description: pair.description || "",
            days: pair.days || null,
            hours: pair.hours || null
          })
          .select()
          .single();

        if (accErr) {
          console.error("Accomplishment error:", accErr);
          throw new Error(`Accomplishment insert failed: ${accErr.message}`);
        }

        // 3️⃣ IMAGES
        const images = pair.images || [];
        for (let i = 0; i < images.length; i++) {
          totalImages++;
          const img64 = images[i];
          
          try {
            const file = base64ToFile(img64, `${Date.now()}_${i}.jpg`);
            const path = `${month}/${entry.week || 'week'}/${Date.now()}_${i}.jpg`;

            const { data: uploadData, error: uploadErr } =
              await supabaseClient.storage
                .from('ojt-images')
                .upload(path, file, {
                  cacheControl: '3600',
                  upsert: false
                });

            if (uploadErr) throw uploadErr;

            const { data: publicUrlData } =
              supabaseClient.storage
                .from('ojt-images')
                .getPublicUrl(uploadData.path);

            await supabaseClient.from('ojt_images').insert({
              accomplishment_id: accRow.id,
              image_url: publicUrlData.publicUrl
            });
            
          } catch (imgErr) {
            console.error("Image upload error:", imgErr);
            // Continue with other images, don't fail entire migration
            alert(`Warning: One image failed to upload: ${imgErr.message}`);
          }
        }
      }
    }
  }

  alert(`✅ MIGRATION COMPLETE!\n\n📊 Summary:\n- Entries: ${totalEntries}\n- Accomplishments: ${totalAccomplishments}\n- Images: ${totalImages}\n\nAll data is now in Supabase!`);
}
