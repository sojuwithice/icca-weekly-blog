<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICCA CMS | Supabase Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #245290;
            --secondary: #91bad3;
            --bg: #f4f7f6;
            --accent: #F8ECE0;
            --white: #ffffff;
            --danger: #e74c3c;
            --gray: #7a8ba0;
            --dark: #1e3a5a;
        }

        body {
            background: var(--bg);
            padding: 50px 20px;
            font-family: 'Inter', sans-serif;
            color: var(--dark);
        }

        .dashboard-header { text-align: center; margin-bottom: 50px; }
        .dashboard-header h1 {
            font-family: 'Archivo Black', sans-serif;
            font-size: 35px;
            color: var(--primary);
            text-transform: uppercase;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: 480px 1fr;
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: var(--white);
            border-radius: 28px;
            padding: 30px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(145, 186, 211, 0.2);
        }

        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 6px; color: var(--gray); text-transform: uppercase; }
        input, textarea, select {
            width: 100%; padding: 12px; border: 2px solid #eef2f6; border-radius: 12px; font-size: 14px; outline: none;
        }

        .td-pair-group {
            background: #f9fbfd;
            border: 1px solid #eef2f8;
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
        }

        .plus-box {
            background: var(--primary); color: white; width: 30px; height: 30px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 8px; cursor: pointer; font-weight: bold;
        }

        .btn-save {
            background: var(--primary); color: white; border: none; padding: 16px;
            border-radius: 15px; width: 100%; font-weight: 700; cursor: pointer;
            margin-top: 10px;
        }

        .img-preview-box {
            width: 100%;
            background: #eee;
            border-radius: 10px;
            margin-top: 8px;
            padding: 8px;
            overflow: visible;
        }

        .preview-gallery {
            display: grid !important;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 8px;
            margin-top: 10px;
            width: 100%;
        }

        .preview-gallery img {
            display: block;
        }

        .preview-item {
            position: relative;
            display: inline-block;
        }

        .preview-gallery .preview-item img {
            width: 100%;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #eef2f8;
        }

        .remove-img-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }

        .remove-img-btn:hover {
            transform: scale(1.1);
            background: #c0392b;
        }

        .entry-item {
            background: white; border: 1px solid #eef2f8; padding: 15px;
            border-radius: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
        }
        .preview-mini-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 6px;
            border-radius: 8px;
            transition: 0.2s;
        }

        .action-btn:hover { background: #f1f5f9; }
        .edit-btn { color: var(--primary); }
        .delete-btn { color: var(--danger); }

        .days-badge {
            background: #eef2fa;
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            color: var(--primary);
            margin-top: 4px;
        }
        
        .edit-mode-banner {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 10px 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #b45309;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .cancel-edit-btn {
            background: #e2e8f0;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            color: #1e293b;
        }
        
        .loading-spinner {
            text-align: center;
            padding: 40px;
            color: var(--gray);
        }
        
        .empty-state {
            text-align: center;
            color: var(--gray);
            padding: 40px;
        }
    </style>
</head>
<body>

    <div class="dashboard-header">
        <h1>ICCA CMS (Supabase Edition)</h1>
    </div>

    <div class="admin-grid">
        <div class="card">
            <h3>Add Entry</h3>
            <div id="editBanner"></div>
            <div class="form-group">
                <label>Month</label>
                <select id="monthSelect">
                    <option value="february">February</option>
                    <option value="march">March</option>
                    <option value="april">April</option>
                    <option value="may">May</option>
                </select>
            </div>
            <div class="form-group">
                <label>Week Display</label>
                <input type="text" id="weekNum" placeholder="e.g., Week 01">
            </div>
            <div class="form-group">
                <label>Date Range</label>
                <input type="text" id="weekDate" placeholder="e.g., (Apr 20-24)">
            </div>
            <div class="form-group">
                <label>Hours</label>
                <input type="text" id="workHours" placeholder="e.g., 08">
            </div>

            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <label style="margin:0;">ACCOMPLISHMENTS (Pairs)</label>
                    <span class="plus-box" onclick="addNewPair()">+</span>
                </div>
                <div id="pairsContainer"></div>
            </div>

            <button class="btn-save" onclick="saveContent()">Publish to Supabase</button>
        </div>

        <div class="card">
            <h3>Published Content</h3>
            <div id="contentList">
                <div class="loading-spinner">Loading entries from Supabase...</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
            "https://xtgbphcuzreotwuaiwyx.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0Z2JwaGN1enJlb3R3dWFpd3l4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NTUyODQsImV4cCI6MjA5NDAzMTI4NH0.59pNISn8T7RZULUjntEm7r4PNMx-2ke_bqhkqkEHR30"
        );

        let isEditingMode = false;
        let editingEntryId = null;
        let currentImagesData = new Map(); // Store temp image URLs per pair

        function addNewPair() {
            const pairId = Date.now() + Math.random();
            const container = document.getElementById('pairsContainer');
            const pairDiv = document.createElement('div');
            pairDiv.className = 'td-pair-group';
            pairDiv.dataset.pairId = pairId;
            pairDiv.innerHTML = `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <b style="font-size:12px; color:var(--primary)">Accomplishment ${container.children.length + 1}</b>
                    <span style="color:var(--danger); cursor:pointer; font-weight:bold" onclick="this.parentElement.parentElement.remove()">✕</span>
                </div>
                <input type="text" class="pair-title" placeholder="Title (e.g. Onsite Accomplishment)" style="margin-bottom:10px;">
                <textarea class="pair-desc" placeholder="What did you do?" style="margin-bottom:10px; height: 80px;"></textarea>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
                    <div>
                        <label style="font-size:10px; color:var(--gray);">DAYS PRESENT</label>
                        <input type="number" class="pair-days" placeholder="e.g., 2" step="0.5">
                    </div>
                    <div>
                        <label style="font-size:10px; color:var(--gray);">WORK HOURS</label>
                        <input type="number" class="pair-hours" placeholder="e.g., 8" step="0.5">
                    </div>
                </div>
                <label style="font-size:10px;">Upload Photo:</label>
                <input type="file" class="pair-file-input" accept="image/*" multiple onchange="handleFileSelect(this)">
                <div class="img-preview-box preview-gallery"></div>
            `;
            container.appendChild(pairDiv);
            currentImagesData.set(pairId, []);
        }

        async function handleFileSelect(input) {
            const files = Array.from(input.files);
            const pairDiv = input.closest('.td-pair-group');
            const pairId = pairDiv.dataset.pairId;
            const previewBox = pairDiv.querySelector('.preview-gallery');
            
            for (const file of files) {
                const fileExt = file.name.split('.').pop();
                const fileName = `${Date.now()}_${Math.random()}.${fileExt}`;
                const filePath = `cms_images/${fileName}`;
                
                const { error: uploadError } = await supabase.storage
                    .from('ojt-images')
                    .upload(filePath, file);
                
                if (uploadError) {
                    console.error('Upload error:', uploadError);
                    alert('Failed to upload image: ' + uploadError.message);
                    continue;
                }
                
                const { data: urlData } = supabase.storage
                    .from('ojt-images')
                    .getPublicUrl(filePath);
                
                const imageUrl = urlData.publicUrl;
                
                // Store in temp map
                const currentImages = currentImagesData.get(pairId) || [];
                currentImages.push(imageUrl);
                currentImagesData.set(pairId, currentImages);
                
                // Add preview
                const wrapper = document.createElement('div');
                wrapper.className = 'preview-item';
                wrapper.innerHTML = `
                    <img src="${imageUrl}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;">
                    <button class="remove-img-btn" onclick="removeTempImage(this, '${pairId}', '${imageUrl}')">✕</button>
                `;
                previewBox.appendChild(wrapper);
            }
            input.value = '';
        }
        
        function removeTempImage(btn, pairId, imageUrl) {
            const images = currentImagesData.get(pairId) || [];
            const index = images.indexOf(imageUrl);
            if (index > -1) images.splice(index, 1);
            currentImagesData.set(pairId, images);
            btn.closest('.preview-item').remove();
        }

        async function saveContent() {
            const month = document.getElementById('monthSelect').value;
            const week = document.getElementById('weekNum').value.trim();
            const date = document.getElementById('weekDate').value.trim();
            
            if (!week) {
                alert("Please enter Week");
                return;
            }
            
            const pairs = [];
            const pairDivs = document.querySelectorAll('.td-pair-group');
            
            for (const pairDiv of pairDivs) {
                const title = pairDiv.querySelector('.pair-title').value.trim();
                if (!title) continue;
                
                const description = pairDiv.querySelector('.pair-desc').value.trim();
                const days = parseFloat(pairDiv.querySelector('.pair-days').value) || 0;
                const hours = parseFloat(pairDiv.querySelector('.pair-hours').value) || 0;
                const pairId = pairDiv.dataset.pairId;
                const images = currentImagesData.get(pairId) || [];
                
                pairs.push({ title, description, days, hours, images });
            }
            
            if (pairs.length === 0) {
                alert("Add at least one accomplishment");
                return;
            }
            
            const totalHours = pairs.reduce((sum, p) => sum + p.hours, 0);
            
            try {
                if (isEditingMode && editingEntryId) {
                    // UPDATE existing entry
                    const { error: updateError } = await supabase
                        .from('ojt_entries')
                        .update({
                            week: week,
                            date: date,
                            total_hours: totalHours,
                            updated_at: new Date().toISOString()
                        })
                        .eq('id', editingEntryId);
                    
                    if (updateError) throw updateError;
                    
                    // Delete old accomplishments and images
                    const { data: oldAccomps } = await supabase
                        .from('ojt_accomplishments')
                        .select('id')
                        .eq('entry_id', editingEntryId);
                    
                    if (oldAccomps) {
                        for (const acc of oldAccomps) {
                            await supabase.from('ojt_images').delete().eq('accomplishment_id', acc.id);
                        }
                        await supabase.from('ojt_accomplishments').delete().eq('entry_id', editingEntryId);
                    }
                    
                    // Insert new accomplishments
                    for (const pair of pairs) {
                        const { data: accData, error: accError } = await supabase
                            .from('ojt_accomplishments')
                            .insert({
                                entry_id: editingEntryId,
                                title: pair.title,
                                description: pair.description,
                                days: pair.days,
                                hours: pair.hours
                            })
                            .select()
                            .single();
                        
                        if (accError) throw accError;
                        
                        for (const imgUrl of pair.images) {
                            await supabase.from('ojt_images').insert({
                                accomplishment_id: accData.id,
                                image_url: imgUrl
                            });
                        }
                    }
                    
                    alert("Entry updated successfully!");
                } else {
                    // INSERT new entry
                    const { data: entryData, error: entryError } = await supabase
                        .from('ojt_entries')
                        .insert({
                            month: month,
                            week: week,
                            date: date,
                            total_hours: totalHours
                        })
                        .select()
                        .single();
                    
                    if (entryError) throw entryError;
                    
                    for (const pair of pairs) {
                        const { data: accData, error: accError } = await supabase
                            .from('ojt_accomplishments')
                            .insert({
                                entry_id: entryData.id,
                                title: pair.title,
                                description: pair.description,
                                days: pair.days,
                                hours: pair.hours
                            })
                            .select()
                            .single();
                        
                        if (accError) throw accError;
                        
                        for (const imgUrl of pair.images) {
                            await supabase.from('ojt_images').insert({
                                accomplishment_id: accData.id,
                                image_url: imgUrl
                            });
                        }
                    }
                    
                    alert("Published successfully!");
                }
                
                resetForm();
                await loadEntries();
                
            } catch (error) {
                console.error('Save error:', error);
                alert("Error saving: " + error.message);
            }
        }
        
        async function loadEntries() {
            const container = document.getElementById('contentList');
            container.innerHTML = '<div class="loading-spinner">Loading entries from Supabase...</div>';
            
            try {
                const { data: entries, error } = await supabase
                    .from('ojt_entries')
                    .select(`
                        *,
                        ojt_accomplishments (
                            *,
                            ojt_images (*)
                        )
                    `)
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                if (!entries || entries.length === 0) {
                    container.innerHTML = '<div class="empty-state">No entries yet. Create your first entry!</div>';
                    return;
                }
                
                let html = '';
                for (const entry of entries) {
                    const accomplishments = entry.ojt_accomplishments || [];
                    const firstImages = [];
                    let daysList = new Set();
                    let totalPairHours = 0;
                    
                    for (const acc of accomplishments) {
                        if (acc.days) daysList.add(acc.days);
                        totalPairHours += acc.hours || 0;
                        const images = acc.ojt_images || [];
                        if (images.length && firstImages.length < 3) {
                            firstImages.push(...images.slice(0, 3 - firstImages.length));
                        }
                    }
                    
                    const daysBadges = Array.from(daysList).map(d => 
                        `<span class="days-badge">📆 ${d}d</span>`
                    ).join('');
                    
                    html += `
                        <div class="entry-item">
                            <div style="display:flex; gap:15px; align-items:center; flex-wrap:wrap;">
                                <div style="display:flex; gap:5px; flex-wrap:wrap;">
                                    ${firstImages.length ? firstImages.map(img => 
                                        `<img src="${img.image_url}" class="preview-mini-img" style="width:50px;height:50px;object-fit:cover;border-radius:8px;">`
                                    ).join('') : '<div style="width:50px;height:50px;background:#eef2f6;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;">📷</div>'}
                                </div>
                                <div>
                                    <b style="color:var(--primary); font-size:14px;">${entry.month?.toUpperCase() || ''} | ${entry.week}</b>
                                    ${entry.date ? `<div style="font-size:11px; color:var(--gray);">${escapeHtml(entry.date)}</div>` : ''}
                                    <div style="margin-top: 5px;">${daysBadges || '<span class="days-badge">✨ days present</span>'}</div>
                                    <small style="color:var(--gray)">${accomplishments.length} accomplishments</small>
                                </div>
                            </div>
                            <div style="display:flex; gap:8px; align-items:center;">
                                <button class="action-btn edit-btn" onclick="editEntry('${entry.id}')" title="Edit">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                                        <path d="M12 20h9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                        <path d="M16.5 3.5l4 4L7 21H3v-4L16.5 3.5z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                                    </svg>
                                </button>
                                <button class="action-btn delete-btn" onclick="deleteEntry('${entry.id}')" title="Delete">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                                        <path d="M3 6h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                        <path d="M8 6V4h8v2" stroke="currentColor" stroke-width="2"/>
                                        <path d="M6 6l1 16h10l1-16" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html;
            } catch (error) {
                console.error('Load error:', error);
                container.innerHTML = '<div class="empty-state">Error loading entries: ' + error.message + '</div>';
            }
        }
        
        async function editEntry(entryId) {
            try {
                const { data: entry, error } = await supabase
                    .from('ojt_entries')
                    .select(`
                        *,
                        ojt_accomplishments (
                            *,
                            ojt_images (*)
                        )
                    `)
                    .eq('id', entryId)
                    .single();
                
                if (error) throw error;
                
                isEditingMode = true;
                editingEntryId = entryId;
                
                document.getElementById('monthSelect').value = entry.month;
                document.getElementById('weekNum').value = entry.week;
                document.getElementById('weekDate').value = entry.date || '';
                
                document.getElementById('pairsContainer').innerHTML = '';
                currentImagesData.clear();
                
                const accomplishments = entry.ojt_accomplishments || [];
                for (const acc of accomplishments) {
                    const pairId = Date.now() + Math.random();
                    const pairDiv = document.createElement('div');
                    pairDiv.className = 'td-pair-group';
                    pairDiv.dataset.pairId = pairId;
                    
                    const images = (acc.ojt_images || []).map(img => img.image_url);
                    currentImagesData.set(pairId, images);
                    
                    let previewHtml = '';
                    for (const imgUrl of images) {
                        previewHtml += `
                            <div class="preview-item">
                                <img src="${imgUrl}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;">
                                <button class="remove-img-btn" onclick="removeTempImage(this, '${pairId}', '${imgUrl}')">✕</button>
                            </div>
                        `;
                    }
                    
                    pairDiv.innerHTML = `
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                            <b style="font-size:12px; color:var(--primary)">Accomplishment</b>
                            <span style="color:var(--danger); cursor:pointer; font-weight:bold" onclick="this.parentElement.parentElement.remove()">✕</span>
                        </div>
                        <input type="text" class="pair-title" value="${escapeHtml(acc.title)}" style="margin-bottom:10px;">
                        <textarea class="pair-desc" style="margin-bottom:10px; height: 80px;">${escapeHtml(acc.description || '')}</textarea>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
                            <div>
                                <label style="font-size:10px; color:var(--gray);">DAYS PRESENT</label>
                                <input type="number" class="pair-days" value="${acc.days || 0}" step="0.5">
                            </div>
                            <div>
                                <label style="font-size:10px; color:var(--gray);">WORK HOURS</label>
                                <input type="number" class="pair-hours" value="${acc.hours || 0}" step="0.5">
                            </div>
                        </div>
                        <label style="font-size:10px;">Upload Photo:</label>
                        <input type="file" class="pair-file-input" accept="image/*" multiple onchange="handleFileSelect(this)">
                        <div class="img-preview-box preview-gallery">${previewHtml}</div>
                    `;
                    document.getElementById('pairsContainer').appendChild(pairDiv);
                }
                
                document.getElementById('editBanner').innerHTML = `
                    <div class="edit-mode-banner">
                        <span>✏️ EDITING MODE: Editing ${entry.month?.toUpperCase()} - ${entry.week}</span>
                        <button class="cancel-edit-btn" onclick="cancelEdit()">Cancel Edit</button>
                    </div>
                `;
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
                
            } catch (error) {
                console.error('Edit error:', error);
                alert("Error loading entry for editing: " + error.message);
            }
        }
        
        async function deleteEntry(entryId) {
            if (!confirm("Delete this entry permanently?")) return;
            
            try {
                // Get accomplishments first to delete their images
                const { data: accomplishments } = await supabase
                    .from('ojt_accomplishments')
                    .select('id')
                    .eq('entry_id', entryId);
                
                if (accomplishments) {
                    for (const acc of accomplishments) {
                        await supabase.from('ojt_images').delete().eq('accomplishment_id', acc.id);
                    }
                    await supabase.from('ojt_accomplishments').delete().eq('entry_id', entryId);
                }
                
                await supabase.from('ojt_entries').delete().eq('id', entryId);
                
                if (isEditingMode && editingEntryId === entryId) {
                    cancelEdit();
                }
                
                await loadEntries();
                alert("Entry deleted successfully!");
                
            } catch (error) {
                console.error('Delete error:', error);
                alert("Error deleting: " + error.message);
            }
        }
        
        function cancelEdit() {
            isEditingMode = false;
            editingEntryId = null;
            resetForm();
            document.getElementById('editBanner').innerHTML = '';
        }
        
        function resetForm() {
            document.getElementById('weekNum').value = '';
            document.getElementById('weekDate').value = '';
            document.getElementById('monthSelect').value = 'february';
            document.getElementById('pairsContainer').innerHTML = '';
            currentImagesData.clear();
            addNewPair(); // Add one empty pair
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => 
                m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'
            );
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            resetForm();
            loadEntries();
        });
        
        window.addNewPair = addNewPair;
        window.saveContent = saveContent;
        window.editEntry = editEntry;
        window.deleteEntry = deleteEntry;
        window.cancelEdit = cancelEdit;
